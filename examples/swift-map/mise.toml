[tasks.build]
depends = ["//:ensure-native-library"]
run = '''
if [[ "$MISE_ENV" == ios-* ]]; then
  swift build \
    --product swift-map-ios \
    --scratch-path ".build/$MISE_ENV" \
    --sdk "$MLN_FFI_SYSTEM_ROOT" \
    --triple "$MLN_FFI_SWIFT_TARGET_TRIPLE"
else
  swift build --product swift-map --scratch-path ".build/$MISE_ENV"
fi
'''

[tasks.run]
usage = 'arg "[render-target]"'
run = '''
if [[ "$MISE_ENV" == ios-simulator-* ]]; then
  exec mise run run:ios-simulator
fi
if [[ "$MISE_ENV" == ios-* ]]; then
  echo "swift-map run is only supported for iOS simulator environments, not $MISE_ENV" >&2
  exit 1
fi
if [[ -z "{{ usage.render_target }}" ]]; then
  echo "Usage: mise run //examples/swift-map:run -- <render-target>" >&2
  exit 1
fi
mise run build
exec ".build/$MISE_ENV/debug/swift-map" "{{ usage.render_target }}"
'''

[tasks."run:owned-texture"]
run = [{ task = "run", args = ["owned-texture"] }]

[tasks."run:borrowed-texture"]
run = [{ task = "run", args = ["borrowed-texture"] }]

[tasks."run:native-surface"]
run = [{ task = "run", args = ["native-surface"] }]
