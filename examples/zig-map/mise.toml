[tasks.compile-shaders]
hide = true
run = '''
set -euo pipefail

if [[ "$MLN_FFI_RENDER_BACKEND" == "vulkan" ]]; then
  glslangValidator -V render/vulkan/shaders/fullscreen.vert -o render/vulkan/shaders/fullscreen.vert.spv
  glslangValidator -V render/vulkan/shaders/sample.frag -o render/vulkan/shaders/sample.frag.spv
fi
'''

[tasks.build]
depends = ["//:ensure-native-library", ":compile-shaders"]
run = "zig build {{ env.MLN_FFI_ZIG_BUILD_ARGS }} -Dnative-config=\"$MLN_FFI_BUILD_DIR/maplibre-native-c.zig-config\""

[tasks.run]
depends = ["//:ensure-native-library", ":compile-shaders"]
usage = 'arg "render-target"'
run = 'zig build run {{ env.MLN_FFI_ZIG_BUILD_ARGS }} -Dnative-config="$MLN_FFI_BUILD_DIR/maplibre-native-c.zig-config" -- "{{ usage.render_target }}"'

[tasks."run:owned-texture"]
run = [{ task = "run", args = ["owned-texture"] }]

[tasks."run:borrowed-texture"]
run = [{ task = "run", args = ["borrowed-texture"] }]

[tasks."run:native-surface"]
run = [{ task = "run", args = ["native-surface"] }]
