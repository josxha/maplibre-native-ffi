[tasks.build]
depends = ["//:ensure-native-library"]
run = "zig build {{ env.MLN_FFI_ZIG_BUILD_ARGS }} -Dnative-config=\"$MLN_FFI_BUILD_DIR/maplibre-native-c.zig-config\""

[tasks.run]
depends = ["//:ensure-native-library"]
run = '''
mkdir -p zig-out
zig build run {{ env.MLN_FFI_ZIG_BUILD_ARGS }} -Dnative-config="$MLN_FFI_BUILD_DIR/maplibre-native-c.zig-config" -- zig-out/zig-readback.ppm
'''
