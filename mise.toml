# https://mise.jdx.dev
# Mise is the contributor entrypoint: it pins tools, installs hooks, and runs
# repository tasks.

experimental_monorepo_root = true

[settings]
lockfile = true
lockfile_platforms = ["linux-x64", "linux-arm64", "macos-arm64", "windows-x64"]
pin = true
experimental = true
python.uv_venv_auto = "create|source"
windows_default_file_shell_args = '"C:/Program Files/Git/bin/bash.exe" -e -lc "source ""$MLN_FFI_REPO_ROOT/.mise/bin/windows-msvc-path.sh""; exec ""C:/Program Files/Git/bin/bash.exe"" ""$@""" _'
windows_default_inline_shell_args = '"C:/Program Files/Git/bin/bash.exe" -e -lc "source ""$MLN_FFI_REPO_ROOT/.mise/bin/windows-msvc-path.sh""; eval ""$1""" _'
unix_default_file_shell_args = "bash"
unix_default_inline_shell_args = "bash -e -lc"
# On Windows, the Microsoft Store Python alias in WindowsApps can appear before
# mise-managed Python. Keep mise tool paths first so file tasks run pinned tools.
activate_aggressive = true

[monorepo]
config_roots = [".devcontainer", "bindings/*", "examples/*", "docs"]

[tools]
# General tooling
"aqua:jdx/usage" = "3.3.0" # CLI completion for mise tasks
"aqua:jdx/hk" = "1.45.0" # Linter orchestration
"aqua:apple/pkl" = "0.31.0" # hk config dependency
"aqua:dprint/dprint" = "0.53.2" # Formatter orchestration
"github:sargunv/jvl" = "2026.05.03" # JSON validator
"aqua:rhysd/actionlint" = "1.7.8" # GH Actions linter
"aqua:koalaman/shellcheck" = "0.11.0" # Shell script linter (used by actionlint)

# C/C++ ecosystem
"pipx:conan" = "2.29.1"
"cmake" = "4.3.3"
"ninja" = "1.13.2"
"clang" = "22.1.7"
"clang-format" = "22.1.7"
"github:cmakefmt/cmakefmt" = "1.3.0"
"conda:glslang" = "16.3.0" # glslangValidator for example SPIR-V shaders
"conda:doxygen" = "1.13.2" # docs C API reference generation
"aqua:XcodesOrg/xcodes" = { version = "1.6.2", os = ["macos"] }

# Node.js ecosystem
"core:node" = "24.11.0"
"aqua:pnpm/pnpm" = "10.33.2"

# Java/Kotlin ecosystem
"core:java" = "temurin-25.0.3+9.0.LTS"
"aqua:facebook/ktfmt" = "0.62"
"github:google/google-java-format" = "1.35.0"

# Python ecosystem
"core:python" = "3.14.4"
"aqua:astral-sh/uv" = "0.11.11"

# Swift ecosystem
"core:swift" = { version = "6.3.1", os = ["macos"] }
"github:nicklockwood/SwiftFormat" = "0.61.1"

# Other ecosystems
"core:rust" = { version = "1.95.0", profile = "minimal", components = "rustfmt,clippy" }
"core:zig" = "0.16.0"
"core:go" = "1.26.3"
"core:dotnet" = "10.0.203"

[env]
UV_PYTHON = { value = "{{ tools.python.path }}", tools = true }
MLN_FFI_REPO_ROOT = "{{config_root}}"
MLN_FFI_VARIANT = { required = true }
MLN_FFI_TARGET_TRIPLE = { required = true }
MLN_FFI_CONAN_PROFILE = { required = true }
MLN_FFI_RENDER_BACKEND = { required = true }
MLN_FFI_BUILD_DIR = { required = true }
MLN_FFI_CMAKE_BUILD_TYPE = "{{env.MLN_FFI_CMAKE_BUILD_TYPE | default(value=\"RelWithDebInfo\")}}"
MLN_FFI_INCLUDE_DIR = "{{config_root}}/include"
MLN_FFI_VULKAN_INCLUDE_DIR = "{{config_root}}/third_party/maplibre-native/vendor/Vulkan-Headers/include"
MLN_FFI_DEPENDENCY_ROOT = { required = true }
MLN_FFI_DEPENDENCY_INCLUDE_DIR = { required = true }
MLN_FFI_DEPENDENCY_LIBRARY_DIR = { required = true }
MLN_FFI_SDL3_PREFIX = { required = true }
MLN_FFI_ZIG_TARGET = { required = true }
MLN_FFI_TEST_TIMEOUT = "{{env.MLN_FFI_TEST_TIMEOUT | default(value=\"30s\")}}"

[hooks]
postinstall = [
  { task = "sync-submodules" },
  "hk install --mise --quiet",
  "uv sync --locked --quiet",
  "pnpm install --frozen-lockfile --loglevel warn",
  "cd bindings/dotnet && dotnet tool restore --verbosity quiet",
  # Astro type stubs for vp typeCheck on docs sources (.astro/ is gitignored).
  "pnpm --filter docs exec astro sync",
]

[tasks.conan-install]
hide = true

[tasks.install-sdl3]
hide = true

[tasks.install-deps]
description = "Install Conan link-time dependencies and SDL3 for examples."
depends = ["//:conan-install", "//:install-sdl3"]

[tasks.configure]
depends = ["//:install-deps"]
run = [
  '''
  conan_output="$MLN_FFI_REPO_ROOT/build/conan/$MLN_FFI_TARGET_TRIPLE"
  cmake_args=(
    -S .
    -B "$MLN_FFI_BUILD_DIR"
    -G Ninja
    -DCMAKE_BUILD_TYPE="$MLN_FFI_CMAKE_BUILD_TYPE"
    -DMLN_FFI_RENDER_BACKEND="$MLN_FFI_RENDER_BACKEND"
    -DCMAKE_TOOLCHAIN_FILE="$conan_output/conan_toolchain.cmake"
    -DCMAKE_PREFIX_PATH="$conan_output"
  )

  if [[ -n "${CC:-}" ]]; then
    cmake_args+=(-DCMAKE_C_COMPILER="$CC")
  fi
  if [[ -n "${CXX:-}" ]]; then
    cmake_args+=(-DCMAKE_CXX_COMPILER="$CXX")
  fi

  if [[ -n "${MLN_FFI_OPENGL_CONTEXT_PROVIDER:-}" ]]; then
    cmake_args+=(-DMLN_FFI_OPENGL_CONTEXT_PROVIDER="$MLN_FFI_OPENGL_CONTEXT_PROVIDER")
  fi

  cmake_args+=(
    -DCMAKE_MAP_IMPORTED_CONFIG_RELWITHDEBINFO=Release
    -DCMAKE_MAP_IMPORTED_CONFIG_DEBUG=Release
    -DCMAKE_MAP_IMPORTED_CONFIG_MINSIZEREL=Release
  )

  # shellcheck disable=SC2086
  cmake "${cmake_args[@]}"
  ''',
  '''
  if [[ -f "$MLN_FFI_BUILD_DIR/compile_commands.json" ]]; then
    mkdir -p build/clangd
    ln -sfn "$MLN_FFI_BUILD_DIR/compile_commands.json" \
      build/clangd/compile_commands.json
  fi
  ''',
]

[tasks.build]
depends = ["//:configure"]
run = '''
build_args=(
  --build "$MLN_FFI_BUILD_DIR"
  --parallel
)

cmake "${build_args[@]}"'''

[tasks.clean]
run = "rm -rf \"$MLN_FFI_BUILD_DIR\""

[tasks.test]
depends = ["//:build"]
run = '''
graphics_library_dir_args=()
if [[ -n "${MLN_FFI_GRAPHICS_LIBRARY_DIR:-}" ]]; then
  graphics_library_dir_args=(-Dgraphics-library-dir="$MLN_FFI_GRAPHICS_LIBRARY_DIR")
fi

(
  cd src/c_api/tests/zig
  zig build -Dtarget="$MLN_FFI_ZIG_TARGET" --test-timeout "$MLN_FFI_TEST_TIMEOUT" test --summary all --verbose -Dcmake-artifact-dir="$MLN_FFI_BUILD_DIR" -Dinclude-dir="$MLN_FFI_INCLUDE_DIR" -Dinclude-dir="$MLN_FFI_DEPENDENCY_INCLUDE_DIR" -Dinclude-dir="$MLN_FFI_VULKAN_INCLUDE_DIR" -Ddependency-library-dir="$MLN_FFI_DEPENDENCY_LIBRARY_DIR" "${graphics_library_dir_args[@]}" -Drender-backend="$MLN_FFI_RENDER_BACKEND"
)
(
  cd bindings/zig
  zig build -Dtarget="$MLN_FFI_ZIG_TARGET" --test-timeout "$MLN_FFI_TEST_TIMEOUT" test --summary all --verbose -Dcmake-artifact-dir="$MLN_FFI_BUILD_DIR" -Dinclude-dir="$MLN_FFI_INCLUDE_DIR" -Dinclude-dir="$MLN_FFI_DEPENDENCY_INCLUDE_DIR" -Dinclude-dir="$MLN_FFI_VULKAN_INCLUDE_DIR" -Ddependency-library-dir="$MLN_FFI_DEPENDENCY_LIBRARY_DIR" "${graphics_library_dir_args[@]}" -Drender-backend="$MLN_FFI_RENDER_BACKEND"
)
'''

[tasks.check]
run = "hk check --all"

[tasks.fix]
run = "hk fix --all"

[tasks.actions-up]
description = "Update and pin GitHub Actions steps."
run = "pnpm dlx actions-up"

[tasks._ktfmt]
description = "Called by dprint.jsonc"
hide = true
run = 'java -jar {{ tools["aqua:facebook/ktfmt"].path }}/ktfmt'
# ktfmt on windows doesn't work in git bash for some reason
shell = '{% if os() == "windows" %}cmd /c{% else %}sh -c -o errexit{% endif %}'

[tasks."ci:lint"]
run = [
  # Warm process-plugin cache before hk runs parallel dprint batches.
  "dprint output-resolved-config > /dev/null",
  "hk fix --all",
  "git update-index -q --refresh",
  # Lockfile drift is common across different mise builds
  "git diff --exit-code -- . ':(exclude)mise.lock' ':(exclude)conan.lock'",
  "git diff --cached --exit-code -- . ':(exclude)mise.lock' ':(exclude)conan.lock'",
]

[tasks."ci:vulkan-info"]
description = "Print the active Vulkan loader and driver summary."
run = "vulkaninfo --summary"
