# https://mise.jdx.dev
# Mise is the contributor entrypoint: it pins tools, installs hooks, and runs
# repository tasks.

experimental_monorepo_root = true

[settings]
pin = true
experimental = true
python.uv_venv_auto = "create|source"
windows_default_file_shell_args = '"C:/Program Files/Git/bin/bash.exe"'
windows_default_inline_shell_args = '"C:/Program Files/Git/bin/bash.exe" -lc'
unix_default_file_shell_args = "bash"
unix_default_inline_shell_args = "bash -lc"
# On Windows, the Microsoft Store Python alias in WindowsApps can appear before
# mise-managed Python. Keep mise tool paths first so file tasks run pinned tools.
activate_aggressive = true

[monorepo]
config_roots = ["bindings/*", "examples/*", "docs"]

[tools]
# General tooling
"aqua:jdx/usage" = "3.3.0" # CLI completion for mise tasks
"aqua:jdx/hk" = "1.45.0" # Linter orchestration
"aqua:apple/pkl" = "0.31.0" # hk config dependency
"aqua:dprint/dprint" = "0.53.2" # Formatter orchestration
"github:sargunv/jvl" = "2026.05.03" # JSON validator
"aqua:rhysd/actionlint" = "1.7.8" # GH Actions linter
"aqua:koalaman/shellcheck" = "0.11.0" # Shell script linter (used by actionlint)

# C/C++ ecosystem
"github:prefix-dev/pixi" = "0.67.2"
"github:cmakefmt/cmakefmt" = "1.3.0"
"conda:doxygen" = "1.13.2"
"aqua:XcodesOrg/xcodes" = { version = "1.6.2", os = ["macos"] }

# Node.js ecosystem
"core:node" = "24.11.0"
"aqua:pnpm/pnpm" = "10.33.2"

# Java/Kotlin ecosystem
"core:java" = "temurin-25.0.3+9.0.LTS"
"aqua:facebook/ktfmt" = "0.62"
"github:google/google-java-format" = "1.35.0"

# Python ecosystem
"core:python" = "3.14.4"
"aqua:astral-sh/uv" = "0.11.11"

# Swift ecosystem
"core:swift" = { version = "6.3.1", os = ["macos", "linux"] }
"github:nicklockwood/SwiftFormat" = "0.61.1"

# Other ecosystems
"core:rust" = { version = "1.95.0", profile = "minimal", components = ["rustfmt", "clippy"] }
"core:zig" = "0.16.0"
"core:go" = "1.26.3"
"core:dotnet" = "10.0.203"

[env]
UV_PYTHON = { value = "{{ tools.python.path }}", tools = true }
MLN_FFI_VARIANT = "{{env.MLN_FFI_VARIANT | default(value=\"host\")}}"
MLN_FFI_TARGET_TRIPLE = "{{env.MLN_FFI_TARGET_TRIPLE | default(value=\"host\")}}"
MLN_FFI_RENDER_BACKEND = "{{env.MLN_FFI_RENDER_BACKEND | default(value=\"\")}}"
MLN_FFI_BUILD_DIR = "{{env.MLN_FFI_BUILD_DIR | default(value=config_root ~ \"/build/\" ~ env.MLN_FFI_VARIANT | default(value=\"host\"))}}"
MLN_FFI_CMAKE_GENERATOR = "{{env.MLN_FFI_CMAKE_GENERATOR | default(value=\"Ninja\")}}"
MLN_FFI_CMAKE_GENERATOR_PLATFORM = "{{env.MLN_FFI_CMAKE_GENERATOR_PLATFORM | default(value=\"\")}}"
MLN_FFI_CMAKE_BUILD_CONFIG = "{{env.MLN_FFI_CMAKE_BUILD_CONFIG | default(value=\"\")}}"
DYLD_LIBRARY_PATH = "{{env.MLN_FFI_BUILD_DIR | default(value=config_root ~ \"/build/host\")}}"
LD_LIBRARY_PATH = "{{env.MLN_FFI_BUILD_DIR | default(value=config_root ~ \"/build/host\")}}"
XDG_DATA_DIRS = "{{config_root}}/.pixi/envs/default/share:{{env.XDG_DATA_DIRS | default(value=\"/usr/local/share:/usr/share\")}}"

[hooks]
postinstall = [
  "git submodule update --init --recursive --depth 1 third_party/maplibre-native",
  "hk install --mise --quiet",
  "pixi install --locked --quiet",
  "uv sync --locked --quiet",
  "cd docs && pnpm install --frozen-lockfile --loglevel warn",
]

[tasks.configure]
run = [
  '''
  cmake_args=(
    -S .
    -B "$MLN_FFI_BUILD_DIR"
    -G "$MLN_FFI_CMAKE_GENERATOR"
  )

  if [[ -n "$MLN_FFI_CMAKE_GENERATOR_PLATFORM" ]]; then
    cmake_args+=(-A "$MLN_FFI_CMAKE_GENERATOR_PLATFORM")
  fi
  if [[ -n "$MLN_FFI_RENDER_BACKEND" ]]; then
    cmake_args+=(-DMLN_FFI_RENDER_BACKEND="$MLN_FFI_RENDER_BACKEND")
  fi
  if [[ -n "$MLN_FFI_ENABLE_CLANG_TIDY" ]]; then
    cmake_args+=(-DMLN_FFI_ENABLE_CLANG_TIDY="$MLN_FFI_ENABLE_CLANG_TIDY")
  fi

  pixi run cmake "${cmake_args[@]}"
  ''',
  '''
  if [[ -f "$MLN_FFI_BUILD_DIR/compile_commands.json" ]]; then
    mkdir -p build/clangd
    ln -sfn "$MLN_FFI_BUILD_DIR/compile_commands.json" \
      build/clangd/compile_commands.json
  fi
  ''',
]

[tasks.build]
depends = ["//:configure"]
run = '''
build_args=(
  --build "$MLN_FFI_BUILD_DIR"
  --parallel
)

if [[ -n "$MLN_FFI_CMAKE_BUILD_CONFIG" ]]; then
  build_args+=(--config "$MLN_FFI_CMAKE_BUILD_CONFIG")
fi

pixi run cmake "${build_args[@]}"
'''

[tasks.clean]
run = "rm -rf \"$MLN_FFI_BUILD_DIR\""

[tasks.test]
depends = ["//:build"]
run = '''
native_library_dir="$MLN_FFI_BUILD_DIR"
if [[ -n "${MLN_FFI_CMAKE_BUILD_CONFIG:-}" && -d "$native_library_dir/$MLN_FFI_CMAKE_BUILD_CONFIG" ]]; then
  native_library_dir="$native_library_dir/$MLN_FFI_CMAKE_BUILD_CONFIG"
fi
zig build test --summary all --verbose -Dcmake-artifact-dir="$native_library_dir" ${MLN_FFI_RENDER_BACKEND:+-Drender-backend=$MLN_FFI_RENDER_BACKEND}
'''

[tasks.check]
run = "hk check --all"

[tasks.fix]
run = "hk fix --all"

[tasks._ktfmt]
description = "Called by dprint.jsonc"
hide = true
run = 'java -jar {{ tools["aqua:facebook/ktfmt"].path }}/ktfmt'

[tasks."ci:lint"]
run = [
  "hk fix --all",
  "git update-index -q --refresh",
  "git diff --exit-code",
  "git diff --cached --exit-code",
]

[tasks."ci:prepare-native-artifact"]
run = [
  "rm -rf ci-artifact",
  "mkdir -p \"ci-artifact/build/${MLN_FFI_VARIANT:-host}\" ci-artifact/third_party/maplibre-native/vendor/Vulkan-Headers",
  '''
  found_native_lib=false
  native_library_dir="$MLN_FFI_BUILD_DIR"
  if [[ -n "${MLN_FFI_CMAKE_BUILD_CONFIG:-}" && -d "$native_library_dir/$MLN_FFI_CMAKE_BUILD_CONFIG" ]]; then
    native_library_dir="$native_library_dir/$MLN_FFI_CMAKE_BUILD_CONFIG"
  fi
  for native_lib in "$native_library_dir"/libmaplibre-native-c.* "$native_library_dir"/maplibre-native-c.*; do
    [[ -e "$native_lib" ]] || continue
    found_native_lib=true
    cp "$native_lib" "ci-artifact/build/${MLN_FFI_VARIANT:-host}"
  done
  if [[ "$found_native_lib" != true ]]; then
    echo "missing $native_library_dir/[lib]maplibre-native-c.*; native artifact was not built" >&2
    exit 1
  fi
  ''',
  "cp -R third_party/maplibre-native/vendor/Vulkan-Headers/include ci-artifact/third_party/maplibre-native/vendor/Vulkan-Headers/include",
]
