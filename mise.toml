# https://mise.jdx.dev
# Mise is the contributor entrypoint: it pins tools, installs hooks, and runs
# repository tasks.

experimental_monorepo_root = true

[settings]
pin = true
experimental = true

[monorepo]
config_roots = ["examples/*", "docs"]

[tools]
hk = "1.40.0"
pkl = "0.31.0"
dprint = "0.53.2"
"github:sargunv/jvl" = "2026.04.29"
pixi = "0.67.2"
"github:cmakefmt/cmakefmt" = "1.3.0"
zig = "0.16.0"
"conda:doxygen" = "1.13.2"
actionlint = "1.7.8"
pnpm = "10.33.2"
node = "24.11.0"
usage = "3.3.0"

[env]
MLN_FFI_VARIANT = "{{env.MLN_FFI_VARIANT | default(value=\"host\")}}"
MLN_FFI_TARGET_TRIPLE = "{{env.MLN_FFI_TARGET_TRIPLE | default(value=\"host\")}}"
MLN_FFI_RENDER_BACKEND = "{{env.MLN_FFI_RENDER_BACKEND | default(value=\"\")}}"
MLN_FFI_BUILD_DIR = "{{env.MLN_FFI_BUILD_DIR | default(value=config_root ~ \"/build/\" ~ env.MLN_FFI_VARIANT | default(value=\"host\"))}}"
DYLD_LIBRARY_PATH = "{{env.MLN_FFI_BUILD_DIR | default(value=config_root ~ \"/build/host\")}}"
LD_LIBRARY_PATH = "{{env.MLN_FFI_BUILD_DIR | default(value=config_root ~ \"/build/host\")}}"
XDG_DATA_DIRS = "{{config_root}}/.pixi/envs/default/share:{{env.XDG_DATA_DIRS | default(value=\"/usr/local/share:/usr/share\")}}"

[hooks]
postinstall = [
  "hk install --mise",
  "pixi install --locked",
  "cd docs && pnpm install",
]

[tasks.configure]
env = { CC = "clang", CXX = "clang++" }
run = [
  "pixi run cmake -S . -B \"$MLN_FFI_BUILD_DIR\" -G Ninja ${MLN_FFI_RENDER_BACKEND:+-DMLN_FFI_RENDER_BACKEND=$MLN_FFI_RENDER_BACKEND}",
  "mkdir -p build/clangd && ln -sfn \"$MLN_FFI_BUILD_DIR/compile_commands.json\" build/clangd/compile_commands.json",
]

[tasks.build]
depends = ["//:configure"]
run = "pixi run cmake --build \"$MLN_FFI_BUILD_DIR\" --parallel"

[tasks.clean]
run = "rm -rf \"$MLN_FFI_BUILD_DIR\""

[tasks.test]
depends = ["//:build"]
run = "zig build test --summary all -Dcmake-artifact-dir=\"$MLN_FFI_BUILD_DIR\" ${MLN_FFI_RENDER_BACKEND:+-Drender-backend=$MLN_FFI_RENDER_BACKEND}"

[tasks.check]
run = "hk check --all"

[tasks.fix]
run = "hk fix --all"

[tasks."ci:lint"]
usage = '''
arg "<profile>" help="Lint profile" {
  choices "common" "native"
}
'''
run = [
  "hk fix --all --profile \"ci-${usage_profile?}\"",
  "git update-index -q --refresh",
  "git diff --exit-code",
  "git diff --cached --exit-code",
]

[tasks."ci:prepare-native-artifact"]
run = [
  "rm -rf ci-artifact",
  "mkdir -p \"ci-artifact/build/${MLN_FFI_VARIANT:-host}\" ci-artifact/third_party/maplibre-native/vendor/Vulkan-Headers",
  "cp \"$MLN_FFI_BUILD_DIR\"/libmaplibre-native-c.* \"ci-artifact/build/${MLN_FFI_VARIANT:-host}\"",
  "cp -R third_party/maplibre-native/vendor/Vulkan-Headers/include ci-artifact/third_party/maplibre-native/vendor/Vulkan-Headers/include",
]
