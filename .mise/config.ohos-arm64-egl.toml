[env]
MLN_FFI_VARIANT = "ohos-arm64-egl"
MLN_FFI_TARGET_TRIPLE = "ohos-arm64"
MLN_FFI_RENDER_BACKEND = "opengl"
MLN_FFI_OPENGL_CONTEXT_PROVIDER = "egl"
MLN_FFI_BUILD_DIR = "{{config_root}}/build/ohos-arm64-egl"
MLN_FFI_ZIG_TARGET = "aarch64-linux-ohos"
MLN_FFI_ZIG_BUILD_ARGS = "-Dtarget=aarch64-linux-ohos -Dcmake-artifact-dir=\"{{env.MLN_FFI_BUILD_DIR}}\" -Drender-backend=opengl -Dinclude-dir=\"{{env.MLN_FFI_INCLUDE_DIR}}\""
OHOS_SDK_NATIVE = { required = true }
MLN_FFI_CMAKE_ARGS = """
-DCMAKE_TOOLCHAIN_FILE={{env.OHOS_SDK_NATIVE}}/build/cmake/ohos.toolchain.cmake
-DOHOS_ARCH=arm64-v8a
-DOHOS_STL=c++_shared
-DMLN_FFI_ENABLE_CLANG_TIDY=OFF
"""
CMAKE_PREFIX_PATH = ""
PKG_CONFIG_PATH = ""
LIBCLANG_PATH = ""
