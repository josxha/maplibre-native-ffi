[env]
MLN_FFI_VARIANT = "macos-arm64-vulkan"
MLN_FFI_TARGET_TRIPLE = "macos-arm64"
MLN_FFI_CONAN_PROFILE = "macos-arm64"
MLN_FFI_RENDER_BACKEND = "vulkan"
MLN_FFI_BUILD_DIR = "{{config_root}}/build/macos-arm64-vulkan"
MLN_FFI_ZIG_TARGET = "aarch64-macos"
MLN_FFI_DEPENDENCY_ROOT = "{{config_root}}/build/deps/macos-arm64"
MLN_FFI_DEPENDENCY_INCLUDE_DIR = "{{config_root}}/build/deps/macos-arm64/include"
MLN_FFI_DEPENDENCY_LIBRARY_DIR = "{{config_root}}/build/graphics/macos-arm64/moltenvk/lib"
MLN_FFI_SDL3_PREFIX = "{{config_root}}/build/deps/macos-arm64/sdl3"
MLN_FFI_SYSTEM_ROOT = "{{env.SDKROOT}}"
VK_ICD_FILENAMES = "{{config_root}}/build/graphics/macos-arm64/moltenvk/share/vulkan/icd.d/MoltenVK_icd.json"
JDK_JAVA_OPTIONS = "-Djava.library.path={{config_root}}/build/graphics/macos-arm64/moltenvk/lib -Dorg.lwjgl.vulkan.libname=libvulkan.1.dylib"
