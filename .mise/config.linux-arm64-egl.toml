[env]
CC = "gcc"
CXX = "g++"
MLN_FFI_VARIANT = "linux-arm64-egl"
MLN_FFI_TARGET_TRIPLE = "linux-arm64"
MLN_FFI_CONAN_PROFILE = "linux-arm64"
MLN_FFI_RENDER_BACKEND = "opengl"
MLN_FFI_OPENGL_CONTEXT_PROVIDER = "egl"
MLN_FFI_BUILD_DIR = "{{config_root}}/build/linux-arm64-egl"
MLN_FFI_ZIG_TARGET = "aarch64-linux-gnu"
MLN_FFI_DEPENDENCY_ROOT = "{{config_root}}/build/deps/linux-arm64"
MLN_FFI_DEPENDENCY_INCLUDE_DIR = "{{config_root}}/build/deps/linux-arm64/include"
MLN_FFI_DEPENDENCY_LIBRARY_DIR = "{{config_root}}/build/deps/linux-arm64/lib"
MLN_FFI_SDL3_PREFIX = "{{config_root}}/build/deps/linux-arm64/sdl3"
LIBCLANG_PATH = "/usr/lib/llvm-18/lib"
