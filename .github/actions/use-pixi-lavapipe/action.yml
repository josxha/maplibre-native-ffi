name: Use Pixi lavapipe
description: Configure Linux CI jobs to use Pixi's Mesa lavapipe Vulkan ICD.

runs:
  using: composite
  steps:
    - name: Select Pixi lavapipe ICD
      shell: bash
      run: |
        shopt -s nullglob
        icds=("$GITHUB_WORKSPACE/.pixi/envs/default/share/vulkan/icd.d"/lvp_icd.*.json)

        if (( ${#icds[@]} != 1 )); then
          printf 'Expected exactly one Pixi lavapipe ICD, found %d:\n' "${#icds[@]}" >&2
          for icd in "${icds[@]}"; do
            printf '  %s\n' "$icd" >&2
          done
          exit 1
        fi

        echo "VK_ICD_FILENAMES=${icds[0]}" >> "$GITHUB_ENV"
