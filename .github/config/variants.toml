# CI variant matrix configuration.
# Platform/backend variants come from mise environments. Example and binding
# entries map tasks to the variants that support them.

[runners]
linux-arm64 = "ubuntu-24.04-arm"
linux-x64 = "ubuntu-latest"
macos-arm64 = "macos-latest"
windows-x64 = "windows-latest"

[examples.swift-map]
task = "//examples/swift-map:build"
requires = { platform = ["macos"], backend = ["metal"] }

[examples.zig-map]
task = "//examples/zig-map:build"
requires = { platform = ["linux", "macos", "windows"], backend = ["metal", "vulkan"] }

[examples.lwjgl-map]
task = "//examples/lwjgl-map:build"
requires = { platform = ["linux", "macos", "windows"], backend = ["vulkan"] }

[examples.rust-map]
task = "//examples/rust-map:ci"
requires = { platform = ["linux", "macos", "windows"], backend = ["vulkan"] }

[examples.zig-readback]
task = "//examples/zig-readback:run"
requires = { platform = ["linux", "macos", "windows"], backend = ["metal", "vulkan"] }

[bindings.java-ffm]
task = "//bindings/java-ffm:build"
requires = { platform = ["linux", "macos", "windows"] }

[bindings.java-jni]
task = "//bindings/java-jni:build"
requires = { platform = ["linux", "macos"] }

[bindings.rust]
task = "//bindings/rust:ci"
requires = { platform = ["linux", "macos", "windows"] }

[bindings.zig]
task = "//bindings/zig:ci"
requires = { platform = ["linux", "macos", "windows"], backend = ["metal", "vulkan"] }
