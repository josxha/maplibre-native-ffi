name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  hygiene:
    name: hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-ci-deps
      - run: mise run ci:lint common

  docs:
    name: docs
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-ci-deps
      - run: mise run //docs:build

  native:
    name: native / ${{ matrix.variant }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    env:
      MISE_ENV: ${{ matrix.variant }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: linux-x64-vulkan
            runner: ubuntu-latest
          - variant: linux-arm64-vulkan
            runner: ubuntu-24.04-arm
          - variant: macos-arm64-metal
            runner: macos-latest
          - variant: macos-arm64-vulkan
            runner: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-ci-deps
      - name: Cache MapLibre Native source
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: third_party/maplibre-native
          key: mln-src-v1-${{ hashFiles('cmake/mln_version.cmake') }}
      - run: mise run configure
      - run: mise run ci:lint native
      - run: mise run test
      - run: mise run ci:prepare-native-artifact
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-${{ matrix.variant }}
          path: ci-artifact
          if-no-files-found: error
          retention-days: 14

  examples:
    name: examples / ${{ matrix.example }} / ${{ matrix.variant }}
    runs-on: ${{ matrix.runner }}
    needs: native
    timeout-minutes: 60
    env:
      MISE_ENV: ${{ matrix.variant }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - example: zig-map
            variant: linux-x64-vulkan
            runner: ubuntu-latest
          - example: zig-map
            variant: linux-arm64-vulkan
            runner: ubuntu-24.04-arm
          - example: zig-map
            variant: macos-arm64-metal
            runner: macos-latest
          - example: zig-map
            variant: macos-arm64-vulkan
            runner: macos-latest
          - example: zig-readback
            variant: linux-x64-vulkan
            runner: ubuntu-latest
          - example: zig-readback
            variant: linux-arm64-vulkan
            runner: ubuntu-24.04-arm
          - example: zig-readback
            variant: macos-arm64-metal
            runner: macos-latest
          - example: zig-readback
            variant: macos-arm64-vulkan
            runner: macos-latest
          - example: swift-map
            variant: macos-arm64-metal
            runner: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-ci-deps
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: native-${{ matrix.variant }}
          path: .
      - run: mise run //examples/${{ matrix.example }}:ci

  required:
    name: ci-required
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ always() }}
    needs:
      - hygiene
      - docs
      - native
      - examples
    steps:
      - name: Fail if required jobs failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        run: |
          echo '${{ toJSON(needs) }}'
          exit 1

      - run: true
