name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  hygiene:
    name: hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-ci-deps
      - run: mise run ci:lint

  docs:
    name: docs
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-ci-deps
      - run: mise run //docs:build

  prepare-matrices:
    name: prepare matrices
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      native: ${{ steps.matrix.outputs.native }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-ci-deps
      - id: matrix
        run: echo "native=$(mise run -q ci:matrix native)" >> "$GITHUB_OUTPUT"

  variants:
    name: variant / ${{ matrix.variant }}
    needs: prepare-matrices
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrices.outputs.native) }}
    uses: ./.github/workflows/ci-variant.yml
    with:
      variant: ${{ matrix.variant }}
      runner: ${{ matrix.runner }}

  required:
    name: ci-required
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ always() }}
    needs:
      - hygiene
      - docs
      - prepare-matrices
      - variants
    steps:
      - name: Fail if required jobs failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        run: |
          echo '${{ toJSON(needs) }}'
          exit 1

      - run: true
