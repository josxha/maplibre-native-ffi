name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  hygiene:
    name: hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-ci-deps
      - run: mise run ci:lint common

  docs:
    name: docs
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-ci-deps
      - run: mise run //docs:build

  prepare-matrices:
    name: prepare matrices
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      native: ${{ steps.matrix.outputs.native }}
      examples: ${{ steps.matrix.outputs.examples }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-ci-deps
      - id: matrix
        run: |
          echo "native=$(mise run -q ci:matrix native)" >> "$GITHUB_OUTPUT"
          echo "examples=$(mise run -q ci:matrix examples)" >> "$GITHUB_OUTPUT"

  native:
    name: native / ${{ matrix.variant }}
    runs-on: ${{ matrix.runner }}
    needs: prepare-matrices
    timeout-minutes: 60
    env:
      MISE_ENV: ${{ matrix.variant }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrices.outputs.native) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Cache MapLibre Native source
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            third_party/maplibre-native
            .git/modules/third_party/maplibre-native
          key: mln-src-v2-${{ hashFiles('.gitmodules', 'cmake/mln_version.cmake') }}
      - uses: ./.github/actions/setup-ci-deps
      - run: mise run configure
      - run: mise run ci:lint native
      - run: mise run test
      - run: mise run ci:prepare-native-artifact
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-${{ matrix.variant }}
          path: ci-artifact
          if-no-files-found: error
          retention-days: 14

  examples:
    name: examples / ${{ matrix.example }} / ${{ matrix.variant }}
    runs-on: ${{ matrix.runner }}
    needs:
      - native
      - prepare-matrices
    timeout-minutes: 60
    env:
      MISE_ENV: ${{ matrix.variant }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrices.outputs.examples) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-ci-deps
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: native-${{ matrix.variant }}
          path: .
      - run: mise run "${{ matrix.task }}"

  required:
    name: ci-required
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ always() }}
    needs:
      - hygiene
      - docs
      - prepare-matrices
      - native
      - examples
    steps:
      - name: Fail if required jobs failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        run: |
          echo '${{ toJSON(needs) }}'
          exit 1

      - run: true
