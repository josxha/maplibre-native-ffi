# https://pixi.prefix.dev/
# Pixi owns the native dependency prefix. CMake, pkg-config, shader tools,
# compilers, and third-party libraries come from conda-forge. Platform SDKs such
# as Xcode and Visual Studio remain external where the compiler packages need
# them.

[workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64", "win-64"]

[system-requirements]
macos = "14.0"

[environments]
format = { features = ["format"], no-default-feature = true }

[target.unix.activation.env]
# Rust bindgen's clang-sys uses LIBCLANG_PATH to find Pixi's libclang.
LIBCLANG_PATH = "$CONDA_PREFIX/lib"
MLN_FFI_DEPENDENCY_INCLUDE_DIR = "$CONDA_PREFIX/include"
MLN_FFI_DEPENDENCY_LIBRARY_DIR = "$CONDA_PREFIX/lib"
RUSTFLAGS = "-C link-arg=-Wl,-rpath,$CONDA_PREFIX/lib -C link-arg=-Wl,-rpath,$MLN_FFI_BUILD_DIR"

[target.linux.activation.env]
LD_LIBRARY_PATH = "$CONDA_PREFIX/lib"
MLN_FFI_SYSTEM_ROOT = "$CONDA_BUILD_SYSROOT"
RUSTFLAGS = "-C link-arg=-Wl,-rpath,$CONDA_PREFIX/lib -C link-arg=-Wl,-rpath-link,$CONDA_PREFIX/lib -C link-arg=-Wl,-rpath,$MLN_FFI_BUILD_DIR"

[target.osx.activation.env]
MLN_FFI_SYSTEM_ROOT = "$SDKROOT"
# Java and LWJGL use Java launcher options on macOS because DYLD_* variables
# are stripped by common shell-script launch paths. Load the Vulkan loader by
# name, then let Pixi's ICD point it at MoltenVK.
JDK_JAVA_OPTIONS = "-Djava.library.path=$CONDA_PREFIX/lib -Dorg.lwjgl.vulkan.libname=libvulkan.1.dylib"
# Use Pixi's MoltenVK ICD for Vulkan runs on macOS.
VK_ICD_FILENAMES = "$CONDA_PREFIX/share/vulkan/icd.d/MoltenVK_icd.json"

[target.linux-64.activation.env]
BINDGEN_EXTRA_CLANG_ARGS = "--sysroot=$CONDA_BUILD_SYSROOT -isystem$CONDA_PREFIX/lib/gcc/x86_64-conda-linux-gnu/14.3.0/include -isystem$CONDA_PREFIX/lib/gcc/x86_64-conda-linux-gnu/14.3.0/include-fixed"
VK_ADD_DRIVER_FILES = "$CONDA_PREFIX/share/vulkan/icd.d/lvp_icd.x86_64.json"

[target.linux-aarch64.activation.env]
BINDGEN_EXTRA_CLANG_ARGS = "--sysroot=$CONDA_BUILD_SYSROOT -isystem$CONDA_PREFIX/lib/gcc/aarch64-conda-linux-gnu/14.3.0/include -isystem$CONDA_PREFIX/lib/gcc/aarch64-conda-linux-gnu/14.3.0/include-fixed"
VK_ADD_DRIVER_FILES = "$CONDA_PREFIX/share/vulkan/icd.d/lvp_icd.aarch64.json"

[target.win.activation.env]
# Rust bindgen's clang-sys uses LIBCLANG_PATH to find Pixi's libclang.
LIBCLANG_PATH = "%CONDA_PREFIX%\\Library\\bin"
MLN_FFI_DEPENDENCY_INCLUDE_DIR = "%CONDA_PREFIX%\\Library\\include"
MLN_FFI_DEPENDENCY_LIBRARY_DIR = "%CONDA_PREFIX%\\Library\\lib"
RUSTFLAGS = "-L native=%CONDA_PREFIX%\\Library\\lib"
VK_ADD_DRIVER_FILES = "%CONDA_PREFIX%\\Library\\share\\vulkan\\icd.d\\lvp_icd.x86_64.json"

[feature.format.dependencies]
# Formatting stays on a single clang-format version across platforms.
clang-tools = ">=22,<23"

[dependencies]
# Build and discovery tools used by repository tasks.
doxygen = ">=1.13.2,<1.14"
cxx-compiler = ">=1.11,<2"
clang-tools = ">=19,<20"
libclang = ">=19,<20"
glslang = ">=16,<17"
cmake = ">=4.3,<5"
ninja = ">=1.13,<2"
pkg-config = ">=0.29,<1"
vulkan-tools = ">=1.4.341,<2"

# Native libraries linked by project code, examples, and vendored MapLibre Native.
icu = ">=78,<79"
libcurl = ">=8,<8.20"
libjpeg-turbo = ">=3.1,<4"
libpng = ">=1.6,<2"
libuv = ">=1,<2"
libwebp = ">=1.6,<2"
sdl3 = ">=3.4,<4"
libvulkan-loader = ">=1.4,<2"
zlib = ">=1.3,<2"

[target.linux-64.dependencies]
mesalib = ">=26.0.3,<27"
sysroot_linux-64 = ">=2.28,<2.29"
libegl-devel = ">=1.7.0,<2"
libopengl-devel = ">=1.7.0,<2"
libgles-devel = ">=1.7.0,<2"

[target.linux-aarch64.dependencies]
mesalib = ">=26.0.3,<27"
sysroot_linux-aarch64 = ">=2.28,<2.29"
libegl-devel = ">=1.7.0,<2"
libopengl-devel = ">=1.7.0,<2"
libgles-devel = ">=1.7.0,<2"

[target.osx-arm64.dependencies]
moltenvk = ">=1.4.1,<2"

[target.win-64.dependencies]
dlfcn-win32 = ">=1.4,<2"
mesalib = ">=26.0.3,<27"
