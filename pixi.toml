# https://pixi.prefix.dev/
# Pixi installs Linux compilers and desktop native libraries used by local builds.

[workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64", "win-64"]

[system-requirements]
macos = "14.0"

[dependencies]
# Native support library used by binding generators.
libclang = ">=22,<23"

# Native libraries linked across all desktop platforms.
libvulkan-loader = ">=1.4,<2"
zlib = ">=1.3,<2"

[target.linux-64.dependencies]
c-compiler = ">=1,<2"
cxx-compiler = ">=1,<2"
libcurl = ">=8,<8.20"
libjpeg-turbo = ">=3.1,<4"
libpng = ">=1.6,<2"
libuv = ">=1,<2"
libwebp = ">=1.6,<2"
libgles-devel = ">=1.7.0,<2"

[target.linux-aarch64.dependencies]
c-compiler = ">=1,<2"
cxx-compiler = ">=1,<2"
libcurl = ">=8,<8.20"
libjpeg-turbo = ">=3.1,<4"
libpng = ">=1.6,<2"
libuv = ">=1,<2"
libwebp = ">=1.6,<2"
libgles-devel = ">=1.7.0,<2"

[target.osx-arm64.dependencies]
moltenvk = ">=1.4.1,<2"

[target.win-64.dependencies]
libcurl = ">=8,<8.20"
libjpeg-turbo = ">=3.1,<4"
libpng = ">=1.6,<2"
libuv = ">=1,<2"
libwebp = ">=1.6,<2"
