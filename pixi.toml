# https://pixi.prefix.dev/
# Pixi supplies native packages from conda-forge so C/C++ dependencies are
# declared in the repository. Platform SDKs such as Xcode still come from the OS.

[workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64", "win-64"]

[system-requirements]
macos = "14.0"

[dependencies]
clang-tools = ">=22,<23"
glslang = "*"
cmake = ">=4,<5"
icu = "*"
libcurl = "*"
libjpeg-turbo = "*"
libpng = "*"
libuv = "*"
libwebp = "*"
ninja = "*"
sdl3 = ">=3.4,<4"
pkg-config = "*"
libvulkan-loader = "*"
zlib = "*"

[target.linux-64.dependencies]
clang = ">=22,<23"
clangdev = ">=22,<23"
mesalib = ">=26.0.3,<27"
sysroot_linux-64 = "*"
vulkan-tools = ">=1.4.341.0,<2"

[target.linux-aarch64.dependencies]
clang = ">=22,<23"
clangdev = ">=22,<23"
mesalib = ">=26.0.3,<27"
sysroot_linux-aarch64 = "*"
vulkan-tools = ">=1.4.341.0,<2"

[target.osx-arm64.dependencies]
moltenvk = ">=1.4.1,<2"

[target.win-64.dependencies]
cxx-compiler = "*"
dlfcn-win32 = "*"
