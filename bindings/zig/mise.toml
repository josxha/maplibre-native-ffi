[tasks.build]
depends = ["//:ensure-native-library"]
run = "zig build {{ env.MLN_FFI_ZIG_BUILD_ARGS }}"

[tasks.test]
depends = ["//:ensure-native-library"]
run = "zig build test {{ env.MLN_FFI_ZIG_BUILD_ARGS }} --test-timeout \"$MLN_FFI_TEST_TIMEOUT\" --summary all --verbose"

[tasks.ci]
depends = [":test"]
