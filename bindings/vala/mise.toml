[tasks.build]
depends = ["//:ensure-native-library"]
dir = "{{env.MLN_FFI_REPO_ROOT}}"
run = "cargo build -p maplibre-native-vala"

[tasks.generate]
depends = [":build"]
dir = "{{env.MLN_FFI_REPO_ROOT}}/bindings/vala"
run = '''
set -euo pipefail
export LD_LIBRARY_PATH="{{env.MLN_FFI_BUILD_DIR}}:{{env.MLN_FFI_REPO_ROOT}}/target/debug:$CONDA_PREFIX/lib:${LD_LIBRARY_PATH:-}"
export DYLD_LIBRARY_PATH="{{env.MLN_FFI_BUILD_DIR}}:{{env.MLN_FFI_REPO_ROOT}}/target/debug:$CONDA_PREFIX/lib:${DYLD_LIBRARY_PATH:-}"
python tools/generate.py
mkdir -p build/gir build/typelib build/vapi

PYTHONPATH="$CONDA_PREFIX/lib/gobject-introspection" \
  "$CONDA_PREFIX/bin/python" \
  "$CONDA_PREFIX/bin/g-ir-scanner" \
  --namespace=MaplibreNative \
  --nsversion=0.1 \
  --identifier-prefix=MlnVala \
  --symbol-prefix=mln_vala \
  --include=GObject-2.0 \
  --warn-all \
  --library-path="{{env.MLN_FFI_REPO_ROOT}}/target/debug" \
  --library-path="{{env.MLN_FFI_BUILD_DIR}}" \
  --library=maplibre_native_vala \
  -Ibuild/include \
  build/include/maplibre-native-vala.h \
  --output build/gir/MaplibreNative-0.1.gir

python - <<'PY'
from pathlib import Path
source = Path("build/gir/MaplibreNative-0.1.gir")
target = Path("build/gir/MaplibreNative-0.1.vapigen.gir")
target.write_text("\n".join(
    line for line in source.read_text().splitlines()
    if "<doc:format" not in line
) + "\n")
PY

vapigen \
  --library=maplibre-native \
  --directory build/vapi \
  --metadatadir metadata \
  --pkg gobject-2.0 \
  build/gir/MaplibreNative-0.1.vapigen.gir

python tools/sanitize_gir.py \
  build/gir/MaplibreNative-0.1.gir \
  build/gir/MaplibreNative-0.1.vapigen.gir

g-ir-compiler \
  build/gir/MaplibreNative-0.1.gir \
  --output build/typelib/MaplibreNative-0.1.typelib

g-ir-generate \
  build/typelib/MaplibreNative-0.1.typelib \
  > build/gir/MaplibreNative-0.1.typelib.gir

python tools/check_generated_surfaces.py \
  build/vapi/maplibre-native.vapi \
  build/gir/MaplibreNative-0.1.gir
python tools/check_generated_surfaces.py \
  build/vapi/maplibre-native.vapi \
  build/gir/MaplibreNative-0.1.typelib.gir
'''

[tasks."compile-tests"]
depends = [":generate"]
dir = "{{env.MLN_FFI_REPO_ROOT}}/bindings/vala"
run = '''
set -euo pipefail
export LD_LIBRARY_PATH="{{env.MLN_FFI_BUILD_DIR}}:{{env.MLN_FFI_REPO_ROOT}}/target/debug:$CONDA_PREFIX/lib:${LD_LIBRARY_PATH:-}"
export DYLD_LIBRARY_PATH="{{env.MLN_FFI_BUILD_DIR}}:{{env.MLN_FFI_REPO_ROOT}}/target/debug:$CONDA_PREFIX/lib:${DYLD_LIBRARY_PATH:-}"
valac \
  --vapidir build/vapi \
  --pkg maplibre-native \
  --pkg gobject-2.0 \
  --pkg gmodule-2.0 \
  -X -Ibuild/include \
  -X -L"{{env.MLN_FFI_REPO_ROOT}}/target/debug" \
  -X -L"{{env.MLN_FFI_BUILD_DIR}}" \
  -X -lmaplibre_native_vala \
  -X -Wl,-rpath,"{{env.MLN_FFI_REPO_ROOT}}/target/debug" \
  -X -Wl,-rpath,"{{env.MLN_FFI_BUILD_DIR}}" \
  -X -Wl,-rpath,"$CONDA_PREFIX/lib" \
  tests/compile/minimal.vala \
  -o build/minimal

./build/minimal
'''

[tasks.test]
depends = ["//:ensure-native-library", ":compile-tests"]
dir = "{{env.MLN_FFI_REPO_ROOT}}"
run = "cargo test -p maplibre-native-vala"

[tasks.ci]
depends = [":test"]
dir = "{{env.MLN_FFI_REPO_ROOT}}"
run = "cargo clippy -p maplibre-native-vala --all-targets -- -D warnings"
