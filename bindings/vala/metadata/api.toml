# Binding metadata for the generated GLib/GObject ABI.
#
# The scanner-facing header is generated from this file, header.jsonl, and the
# public C struct definitions under include/maplibre_native_c/.

[namespace]
c_identifier_prefix = "MlnVala"
gir_namespace = "MaplibreNative"
gir_version = "0.1"
vala_namespace = "MaplibreNative"
rust_crate = "maplibre-native-vala"

[scanner_header]
output = "build/include/maplibre-native-vala.h"
identifier_prefix = "MlnVala"
symbol_prefix = "mln_vala"

[error_domain]
c_name = "mln_vala_error_quark"
vala_name = "MaplibreNative.Error"
variants = [
  "INVALID_ARGUMENT",
  "INVALID_STATE",
  "WRONG_THREAD",
  "UNSUPPORTED",
  "NATIVE_ERROR",
  "UNKNOWN_STATUS",
]
