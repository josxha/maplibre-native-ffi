# Binding metadata for the generated GLib/GObject ABI.
#
# This file is the generator manifest for the scanner-facing public inventory
# and introspection annotation contract. tools/generate.py validates the Rust
# adapter header source against this metadata and emits
# build/include/maplibre-native-vala.h for g-ir-scanner.

[namespace]
c_identifier_prefix = "MlnVala"
gir_namespace = "MaplibreNative"
gir_version = "0.1"
vala_namespace = "MaplibreNative"
rust_crate = "maplibre-native-vala"

[scanner_header]
source = "crates/maplibre-native-vala/include/maplibre-native-vala/maplibre-native-vala.h"
output = "build/include/maplibre-native-vala.h"
identifier_prefix = "MlnVala"
symbol_prefix = "mln_vala"

[error_domain]
c_name = "mln_vala_error_quark"
vala_name = "MaplibreNative.Error"
variants = [
  "INVALID_ARGUMENT",
  "INVALID_STATE",
  "WRONG_THREAD",
  "UNSUPPORTED",
  "NATIVE_ERROR",
  "UNKNOWN_STATUS",
]

[[flags]]
name = "RenderBackendFlags"
c_type = "uint32_t"
values = [
  { name = "METAL", c_symbol = "MLN_RENDER_BACKEND_METAL" },
  { name = "VULKAN", c_symbol = "MLN_RENDER_BACKEND_VULKAN" },
]

