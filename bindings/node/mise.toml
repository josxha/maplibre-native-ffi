[tasks.build]
depends = ["//:ensure-native-library"]
dir = "{{env.MLN_FFI_REPO_ROOT}}"
run = "pnpm --filter @maplibre/native-ffi-node build"

[tasks.test]
depends = [":build"]
dir = "{{env.MLN_FFI_REPO_ROOT}}"
run = "pnpm --filter @maplibre/native-ffi-node test"

[tasks.ci]
depends = [":test"]
dir = "{{env.MLN_FFI_REPO_ROOT}}"
run = [
  "pnpm --filter @maplibre/native-ffi-node typecheck",
  "cargo clippy -p maplibre-native-node --all-targets -- -D warnings",
]
