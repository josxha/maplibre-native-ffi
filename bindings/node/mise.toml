[tasks.build]
depends = ["//:ensure-native-library"]
run = "pnpm install --frozen-lockfile && pnpm build"

[tasks.test]
depends = [":build"]
run = "pnpm test"

[tasks.ci]
depends = [":test"]
dir = "{{env.MLN_FFI_REPO_ROOT}}"
run = [
  "pnpm --dir bindings/node typecheck",
  "cargo clippy -p maplibre-native-node --all-targets -- -D warnings",
]
