# Regenerate with `dart run ffigen --config ffigen.yaml` from bindings/dart.
name: MaplibreNativeC
description: Private generated declarations for the MapLibre Native C API.
output: lib/src/internal/c/maplibre_native_c.g.dart
headers:
  entry-points:
    - ../../include/maplibre_native_c.h
    - ../../src/c_api/dart_shim.h
  include-directives:
    - ../../include/maplibre_native_c.h
    - ../../include/maplibre_native_c/**.h
    - ../../src/c_api/dart_shim.h
compiler-opts:
  - -I../../include
  - -I../../third_party/maplibre-native/vendor/Vulkan-Headers/include
comments: false
silence-enum-warning: true
preamble: |
  // ignore_for_file: always_specify_types
  // ignore_for_file: camel_case_types
  // ignore_for_file: non_constant_identifier_names
  // ignore_for_file: unused_element
  // ignore_for_file: unused_field
