[tools]
"core:dart" = "3.10.9"

[tasks.pub-get]
run = "dart pub get"

[tasks.ffigen]
depends = [":pub-get"]
run = "dart run ffigen --config ffigen.yaml"
sources = [
  "ffigen.yaml",
  "pubspec.yaml",
  "pubspec.lock",
  "../../include/maplibre_native_c.h",
  "../../include/maplibre_native_c/**/*.h",
  "../../src/c_api/dart_shim.h",
]
outputs = ["lib/src/internal/c/maplibre_native_c.g.dart"]

[tasks.ffigen-check]
depends = [":ffigen"]
run = """
mkdir -p .dart_tool
python3 - <<'PY'
from pathlib import Path
config = Path('ffigen.yaml').read_text()
config = config.replace(
    'output: lib/src/internal/c/maplibre_native_c.g.dart',
    'output: .dart_tool/maplibre_native_c.check.g.dart',
)
Path('ffigen.check.yaml').write_text(config)
PY
trap 'rm -f ffigen.check.yaml .dart_tool/maplibre_native_c.check.g.dart' EXIT
dart run ffigen --config ffigen.check.yaml
cmp --silent .dart_tool/maplibre_native_c.check.g.dart lib/src/internal/c/maplibre_native_c.g.dart
"""

[tasks.format]
run = "dart format lib test"

[tasks.analyze]
depends = [":ffigen"]
run = "dart analyze"

[tasks.build]
depends = [":analyze"]

[tasks.test]
depends = ["//:ensure-native-library", ":ffigen"]
run = "dart test"

[tasks.ci]
depends = [":build", ":test"]
